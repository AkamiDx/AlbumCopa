<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album copa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <header class="top">
            <span class="year">2026</span>
            <div class="headquarter">
                <i class="fa-solid fa-earth-americas"></i> USA MEX CAN
            </div>
        </header>
        <figure class="player">
            <img src="gettyimages-2233073902(1).png" alt="#############3" class="jogador-perfil">
            <figcaption class="rarity">Cromo lendario</figcaption>
        </figure>
        <section class="info-player">
            <h1 class="name">Richarlison</h1>
            <p class="position">Atacante</p>
            <div class="statistics">
                <article class="box">
                    <span class="value">95</span>
                    <span class="type">Vel</span>
                </article>
                <article class="box">
                    <span class="value">90</span>
                    <span class="type">Dri</span>
                </article>
                <article class="box">
                    <span class="value">85</span>
                    <span class="type">Fin</span>
                </article>
            </div>
            <footer class="footer-card">
                <i class="fa-solid fa-soccer-ball animated-ball"></i>
                <p>Coleção IFTM</p>
            </footer>
        </section>
    </main>
</body>
</html>
